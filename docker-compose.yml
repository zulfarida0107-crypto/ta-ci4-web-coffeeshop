version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      CI_ENVIRONMENT: development
      database.default.hostname: db
      database.default.database: db_kantin2
      database.default.username: root
      database.default.password: rootpassword
      database.default.DBDriver: MySQLi
    depends_on:
      - db
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: db_kantin2
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
